<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CafeteriaToken — Vendor Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/jpeg" href="logo.jpeg" />
    <link rel="stylesheet" href="vendor.css" />
    <style>
      /* Light mode overrides */
      :root.light-mode {
        --bg: #f8fafc;
        --white: rgba(255, 255, 255, 0.9);
        --surface: rgba(241, 245, 249, 0.8);
        --text: #0f172a;
        --muted: #475569;
        --muted2: #64748b;
      }

      .light-mode .login-bg {
        background:
          radial-gradient(
            ellipse 80% 60% at 20% 20%,
            rgba(251, 146, 60, 0.08) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 80% at 80% 80%,
            rgba(34, 197, 94, 0.05) 0%,
            transparent 60%
          ),
          #f8fafc;
      }

      .light-mode .orb {
        opacity: 0.2;
      }

      .light-mode .login-card {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow:
          0 4px 6px rgba(0, 0, 0, 0.05),
          0 20px 60px rgba(0, 0, 0, 0.1);
      }

      .qr-panel {
        margin: 1rem 0 1.5rem;
        padding: 1rem;
        border-radius: 18px;
        border: 1px solid rgba(251, 146, 96, 0.25);
        background: rgba(15, 23, 42, 0.45);
        text-align: center;
      }

      .qr-panel-title {
        font-size: 0.9rem;
        font-weight: 700;
        color: #f8fafc;
        margin-bottom: 0.7rem;
      }

      .qr-panel img {
        width: 160px;
        height: 160px;
        max-width: 100%;
        border-radius: 16px;
        padding: 10px;
        background: #ffffff;
        display: block;
        margin: 0 auto 0.85rem;
      }

      .qr-links {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .qr-links a {
        color: #fb9460;
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 600;
      }

      .qr-links a:hover {
        text-decoration: underline;
      }

      .light-mode .login-heading,
      .light-mode .brand-name {
        color: #0f172a;
      }

      .light-mode .form-input {
        background: rgba(255, 255, 255, 0.8);
        border-color: rgba(0, 0, 0, 0.1);
        color: #0f172a;
      }

      .light-mode .form-input::placeholder {
        color: #94a3b8;
      }

      /* Theme Toggle Button */
      .theme-toggle-fixed {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 100;
      }

      .btn-theme {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        background: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: white;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-theme:hover {
        background: rgba(30, 41, 59, 1);
        transform: translateY(-2px);
      }

      .light-mode .btn-theme {
        background: rgba(255, 255, 255, 0.8);
        border-color: rgba(0, 0, 0, 0.1);
        color: #0f172a;
      }

      /* Login-specific overrides */
      body.login-body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 120vh;
        overflow-y: auto;
        overflow-x: hidden;
        background: #0f172a;
      }

      .login-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 80% 60% at 20% 20%,
            rgba(251, 146, 60, 0.13) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 80% at 80% 80%,
            rgba(34, 197, 94, 0.1) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 70% 50% at 50% 50%,
            rgba(59, 130, 246, 0.07) 0%,
            transparent 70%
          ),
          #0f172a;
      }

      /* Animated orbs */
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.5;
        animation: orbFloat 8s ease-in-out infinite alternate;
        z-index: 0;
      }

      .orb-1 {
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(251, 146, 60, 0.35),
          transparent
        );
        top: -100px;
        left: -100px;
        animation-delay: 0s;
      }

      .orb-2 {
        width: 350px;
        height: 350px;
        background: radial-gradient(
          circle,
          rgba(34, 197, 94, 0.25),
          transparent
        );
        bottom: -80px;
        right: -80px;
        animation-delay: -3s;
      }

      .orb-3 {
        width: 250px;
        height: 250px;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.2),
          transparent
        );
        top: 50%;
        left: 60%;
        animation-delay: -5s;
      }

      @keyframes orbFloat {
        0% {
          transform: translate(0, 0) scale(1);
        }

        100% {
          transform: translate(30px, 20px) scale(1.08);
        }
      }

      .login-wrapper {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        width: 100%;
        max-width: 440px;
        padding: 1.5rem;
      }

      /* Brand badge */
      .brand-badge {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        animation: fadeSlideDown 0.6s ease both;
      }

      .brand-icon {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }

      .brand-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .brand-name {
        font-family: "Inter", sans-serif;
        font-size: 1.6rem;
        font-weight: 700;
        color: #f1f5f9;
        letter-spacing: 0.03em;
      }

      .brand-sub {
        font-size: 0.78rem;
        color: #64748b;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 500;
      }

      /* Login card */
      .login-card {
        width: 100%;
        background: rgba(30, 41, 59, 0.85);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow:
          0 4px 6px rgba(0, 0, 0, 0.2),
          0 20px 60px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.03),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        animation: fadeSlideUp 0.7s ease 0.1s both;
      }

      .login-heading {
        font-family: "Inter", sans-serif;
        font-size: 1.4rem;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 0.3rem;
      }

      .login-subheading {
        font-size: 0.85rem;
        color: #64748b;
        margin-bottom: 2rem;
      }

      /* Form */
      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: #94a3b8;
        margin-bottom: 0.5rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .input-wrapper {
        position: relative;
      }

      .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1rem;
        color: #475569;
        pointer-events: none;
        transition: color 0.3s;
      }

      .form-input {
        width: 100%;
        background: rgba(15, 23, 42, 0.7);
        border: 1.5px solid rgba(255, 255, 255, 0.07);
        border-radius: 12px;
        color: #f1f5f9;
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
        padding: 0.85rem 1rem 0.85rem 2.8rem;
        outline: none;
        transition:
          border-color 0.3s,
          box-shadow 0.3s,
          background 0.3s;
        box-sizing: border-box;
      }

      .form-input::placeholder {
        color: #334155;
      }

      .form-input:focus {
        border-color: rgba(249, 115, 22, 0.6);
        background: rgba(15, 23, 42, 0.9);
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12);
      }

      .form-input:focus + .input-icon,
      .input-wrapper:focus-within .input-icon {
        color: #f97316;
      }

      /* Error message */
      .error-msg {
        display: none;
        align-items: center;
        gap: 0.4rem;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.25);
        border-radius: 10px;
        padding: 0.65rem 1rem;
        color: #f87171;
        font-size: 0.83rem;
        margin-bottom: 1.25rem;
        animation: shake 0.4s ease;
      }

      .error-msg.show {
        display: flex;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }

        20% {
          transform: translateX(-6px);
        }

        40% {
          transform: translateX(6px);
        }

        60% {
          transform: translateX(-4px);
        }

        80% {
          transform: translateX(4px);
        }
      }

      /* Login button */
      .btn-login {
        width: 100%;
        padding: 0.95rem;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #f97316, #fb923c);
        color: white;
        font-family: "Inter", sans-serif;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 20px rgba(249, 115, 22, 0.35);
        margin-top: 0.5rem;
      }

      .btn-login::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        opacity: 0;
        transition: opacity 0.3s;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(249, 115, 22, 0.5);
      }

      .btn-login:hover::before {
        opacity: 1;
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .btn-login.loading {
        pointer-events: none;
        opacity: 0.8;
      }

      .btn-login .btn-text {
        transition: opacity 0.3s;
      }

      .btn-login .btn-spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto;
      }

      .btn-login.loading .btn-text {
        display: none;
      }

      .btn-login.loading .btn-spinner {
        display: block;
      }

      .login-footer {
        margin-top: 1.75rem;
        padding-top: 1.5rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
      }

      .security-badge {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        color: #475569;
        font-size: 0.75rem;
      }

      .login-hint {
        text-align: center;
        font-size: 0.78rem;
        color: #334155;
        animation: fadeIn 0.6s ease 0.6s both;
      }

      @keyframes fadeSlideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeSlideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Moving Bar */
      .moving-bar {
        position: fixed;
        right: 60px;
        top: 10vh;
        width: 6px;
        height: 180px;
        background: linear-gradient(
          to bottom,
          transparent,
          #f97316 20%,
          #fb923c 50%,
          #f97316 80%,
          transparent
        );
        border-radius: 10px;
        z-index: 10;
        opacity: 0.6;
        box-shadow: 0 0 25px rgba(249, 115, 22, 0.4);
        cursor: ns-resize;
        transition:
          opacity 0.2s,
          width 0.2s;
        user-select: none;
        touch-action: none;
      }

      .moving-bar:hover {
        opacity: 1;
        width: 8px;
      }

      .moving-bar:active {
        cursor: grabbing;
      }

      .light-mode .moving-bar {
        opacity: 0.25;
        box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
      }

      @keyframes barFloating {
        0%,
        100% {
          transform: translateY(10vh);
        }

        50% {
          transform: translateY(70vh);
        }
      }
    </style>
    <link rel="icon" type="image/jpeg" href="logo.jpeg" />
  </head>

  <body class="login-body">
    <div class="login-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="moving-bar"></div>

    <div class="theme-toggle-fixed">
      <button class="btn-theme" id="theme-toggle-btn" onclick="toggleTheme()">
        ☀️ Light Mode
      </button>
    </div>

    <div class="login-wrapper">
      <!-- Brand -->
      <div class="brand-badge">
        <div class="brand-icon">
          <img src="logo.jpeg" alt="Logo" />
        </div>
        <div class="brand-name">CafeteriaToken</div>
        <div class="brand-sub">Digital Token Queue Management</div>
      </div>

      <!-- Card -->
      <div class="login-card">
        <div style="text-align: center; margin-bottom: 20px">
          <a
            href="https://neerajcoder1.github.io/Food-Court-Application/vendor-frontend/vendor-dashboard.html"
            style="
              font-size: 12px;
              color: #fb9460;
              text-decoration: none;
              font-weight: 600;
            "
          >
            🌐 Live Dashboard
          </a>
        </div>
        <div class="qr-panel">
          <div class="qr-panel-title">Vendor Login QR</div>
          <a href="vendor-qr.png" target="_blank" rel="noopener">
            <img src="vendor-qr.png" alt="Vendor login QR code" />
          </a>
          <div class="qr-links">
            <a href="vendor-qr.png" download>Download QR</a>
            <a href="vendor-login.html" target="_blank" rel="noopener">
              Open Vendor Login
            </a>
          </div>
        </div>
        <div class="login-heading">Vendor Portal</div>
        <div class="login-subheading">
          Sign in to manage your food court orders
        </div>

        <div class="error-msg" id="errorMsg">
          <span>⚠️</span>
          <span id="errorText">Invalid Vendor ID or Password.</span>
        </div>

        <form id="loginForm" onsubmit="return false;">
          <div class="form-group">
            <label class="form-label" for="vendorId">Vendor ID</label>
            <div class="input-wrapper">
              <input
                class="form-input"
                type="text"
                id="vendorId"
                placeholder="Enter your vendor ID"
                autocomplete="username"
                autofocus
              />
              <span class="input-icon">🏪</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-wrapper">
              <input
                class="form-input"
                type="password"
                id="password"
                placeholder="Enter your password"
                autocomplete="current-password"
              />
              <span class="input-icon">🔒</span>
            </div>
          </div>

          <button class="btn-login" type="submit" id="loginBtn">
            <span class="btn-text">Sign In to Dashboard →</span>
            <div class="btn-spinner"></div>
          </button>
        </form>

        <div class="login-footer">
          <div class="security-badge">
            🔐 Secured · CafeteriaToken Internal System · v2.0
          </div>
        </div>
      </div>

      <div class="login-hint">
        Campus Food & Facility Management System · GCU
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="login.js"></script>
    <script>
      // ── THEME ──
      function initTheme() {
        const savedTheme = localStorage.getItem("cffms_theme") || "dark";
        applyTheme(savedTheme);
      }

      function toggleTheme() {
        const isDark =
          !document.documentElement.classList.contains("light-mode");
        const newTheme = isDark ? "light" : "dark";
        applyTheme(newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function applyTheme(theme) {
        if (theme === "light") {
          document.documentElement.classList.add("light-mode");
          const btn = document.getElementById("theme-toggle-btn");
          if (btn) btn.innerHTML = "🌙 Dark Mode";
        } else {
          document.documentElement.classList.remove("light-mode");
          const btn = document.getElementById("theme-toggle-btn");
          if (btn) btn.innerHTML = "☀️ Light Mode";
        }
      }
      initTheme();

      // Draggable Bar Logic
      const bar = document.querySelector(".moving-bar");
      let isDragging = false;
      let startY, startTop;

      if (bar) {
        // Update scroll on drag
        function updateScrollFromBar() {
          const maxBarTop = window.innerHeight - bar.offsetHeight;
          const scrollPct = bar.offsetTop / maxBarTop;
          const maxScroll =
            document.documentElement.scrollHeight - window.innerHeight;
          window.scrollTo(0, scrollPct * maxScroll);
        }

        // Update bar from scroll
        function updateBarFromScroll() {
          if (isDragging) return;
          const maxScroll =
            document.documentElement.scrollHeight - window.innerHeight;
          if (maxScroll <= 0) return;
          const scrollPct = window.scrollY / maxScroll;
          const maxBarTop = window.innerHeight - bar.offsetHeight;
          bar.style.top = scrollPct * maxBarTop + "px";
        }

        bar.addEventListener("pointerdown", (e) => {
          isDragging = true;
          startY = e.clientY;
          startTop = bar.offsetTop;
          bar.setPointerCapture(e.pointerId);
        });

        window.addEventListener("pointermove", (e) => {
          if (!isDragging) return;
          const deltaY = e.clientY - startY;
          let newTop = startTop + deltaY;

          const maxTop = window.innerHeight - bar.offsetHeight;
          if (newTop < 0) newTop = 0;
          if (newTop > maxTop) newTop = maxTop;

          bar.style.top = newTop + "px";
          updateScrollFromBar();
        });

        window.addEventListener("pointerup", () => {
          isDragging = false;
        });

        window.addEventListener("scroll", updateBarFromScroll);
        window.addEventListener("resize", updateBarFromScroll);

        // Initial position
        updateBarFromScroll();
      }
    </script>
  </body>
</html>
